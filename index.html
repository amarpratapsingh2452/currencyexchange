<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main">
        <h1>Currency Calculator</h1>
        <div class="container">
            <div class="choices">
                <select id="from-currency" name="currency">
                    <option value="" disabled selected>-- Choose a currency --</option>
                </select>
            </div>
            <div class="choices">
                <select id="to-currency" name="currency">
                    <option value="" disabled selected>-- To be Converted --</option>
                </select>
            </div>
            <div id="amount">
                <input type="number" placeholder="Enter Amount" value="1">
            </div>
            <div id="result"></div>
        </div>
        <div id="btn">Calculate</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
